<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>TECH TITANS · Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      background: #0b0f17;
      display: flex;
      min-height: 100vh;
    }

    /* === SIDEBAR (desktop) === */
    .sidebar {
      width: 260px;
      background: rgba(10, 16, 28, 0.95);
      backdrop-filter: blur(10px);
      border-right: 1px solid #1f2a44;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .logo {
      color: white;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      padding-left: 1rem;
    }
    .logo span { color: #428cff; }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .nav a {
      color: #9aa4bf;
      text-decoration: none;
      padding: 0.9rem 1rem;
      border-radius: 1.2rem;
      transition: 0.2s;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .nav a:hover,
    .nav a.active {
      background: #1f2a44;
      color: white;
    }
    .nav a.active {
      background: #428cff;
      color: white;
      box-shadow: 0 8px 16px -8px #428cff;
    }

    .logout-btn {
      margin-top: auto;
      background: transparent;
      border: 1px solid #2f3a5a;
      color: #ff9f9f;
      padding: 0.9rem;
      border-radius: 1.2rem;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
    }
    .logout-btn:hover {
      background: #ff4d4d20;
      border-color: #ff4d4d;
    }

    /* === MAIN PROFILE AREA === */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      min-width: 0;
    }

    .profile-panel {
      flex: 1;
      background: #131c30;
      border-radius: 2rem;
      border: 1px solid #263154;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 2rem;
    }

    .profile-header {
      padding: 0 0 1.5rem 0;
      border-bottom: 1px solid #263154;
      color: white;
      font-weight: 500;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .profile-header span {
      background: #428cff;
      padding: 0.2rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: 400;
    }

    /* Avatar section */
    .avatar-section {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin: 1.5rem 0 2rem 0;
      flex-wrap: wrap;
    }

    .avatar-container {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #1f2a44;
      border: 3px solid #428cff;
      overflow: hidden;
    }

    .avatar-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-placeholder {
      width: 100%;
      height: 100%;
      background: #2a3455;
      color: #9aa4bf;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 500;
    }

    .avatar-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .avatar-actions label {
      background: #1f2a44;
      border: 1px solid #3a456a;
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 2.5rem;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
    }

    .avatar-actions label:hover {
      background: #2f3a5a;
      border-color: #428cff;
    }

    .avatar-actions label.disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    #avatarUpload {
      display: none;
    }

    .upload-status {
      color: #9aa4bf;
      font-size: 0.9rem;
    }

    /* info rows */
    .info-grid {
      padding: 1rem 0;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .info-row {
      display: flex;
      align-items: baseline;
      border-bottom: 1px dashed #2a3455;
      padding-bottom: 0.8rem;
    }

    .info-label {
      width: 140px;
      color: #9aa4bf;
      font-size: 0.95rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .info-value {
      color: white;
      font-weight: 400;
      flex: 1;
      word-break: break-word;
    }

    /* edit section */
    .edit-section {
      margin-top: 1rem;
      border-top: 1px solid #263154;
      padding-top: 2rem;
    }

    .edit-section h3 {
      color: white;
      font-weight: 500;
      margin-bottom: 1.2rem;
      font-size: 1.2rem;
    }

    .edit-form {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .edit-form input {
      flex: 2;
      min-width: 240px;
      background: #0f172f;
      border: 1px solid #263154;
      border-radius: 2.5rem;
      padding: 0.8rem 1.2rem;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    .edit-form input:focus {
      border-color: #428cff;
    }

    .edit-form button {
      background: #428cff;
      border: none;
      color: white;
      padding: 0.8rem 2rem;
      border-radius: 2.5rem;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
    }

    .edit-form button:hover {
      background: #5f9eff;
      transform: scale(1.02);
    }

    /* mobile adjustments */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        flex-direction: row;
        padding: 0.5rem 1rem;
        gap: 0.5rem;
        border-right: none;
        border-top: 1px solid #1f2a44;
        order: 2;
      }

      .logo {
        display: none;
      }

      .nav {
        flex-direction: row;
        justify-content: space-around;
        flex: 1;
      }

      .nav a {
        padding: 0.6rem;
        border-radius: 1rem;
        font-size: 0.8rem;
        justify-content: center;
      }

      .logout-btn {
        margin-top: 0;
        padding: 0.6rem 1rem;
        font-size: 0.8rem;
        white-space: nowrap;
      }

      .main {
        padding: 0.5rem;
        order: 1;
        min-height: 0;
      }

      .profile-panel {
        padding: 1.2rem;
      }

      .profile-header {
        font-size: 1.2rem;
        padding-bottom: 1rem;
      }

      .avatar-section {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }

      .info-grid {
        padding: 1rem 0;
        gap: 1rem;
      }

      .info-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.2rem;
        border-bottom: none;
        padding-bottom: 0.5rem;
      }

      .info-label {
        width: auto;
        font-size: 0.8rem;
      }

      .info-value {
        font-size: 1rem;
      }

      .edit-form {
        flex-direction: column;
        align-items: stretch;
      }

      .edit-form input {
        width: 100%;
      }

      .edit-form button {
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .nav a span {
        display: none;
      }

      .nav a {
        font-size: 1.2rem;
        padding: 0.4rem;
      }

      .logout-btn {
        padding: 0.4rem 0.8rem;
        font-size: 0.7rem;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div class="sidebar">
    <div class="logo">TECH<span>TITANS</span></div>
    <div class="nav">
      <a href="/dashboard.html">📊 <span>Dashboard</span></a>
      <a href="/messages.html">💬 <span>Group Chat</span></a>
      <a href="/resources.html">📚 <span>Resources</span></a>
      <a href="/profile.html" class="active">⚙️ <span>Profile</span></a>
    </div>
    <button class="logout-btn" id="logout">✕ <span>Logout</span></button>
  </div>

  <div class="main">
    <div class="profile-panel">
      <div class="profile-header">
        👤 Your profile <span>member</span>
      </div>

      <!-- Avatar section -->
      <div class="avatar-section">
        <div class="avatar-container" id="avatarContainer">
          <img id="avatarImage" src="" alt="Profile avatar" style="display: none;">
          <div id="avatarPlaceholder" class="avatar-placeholder"></div>
        </div>
        <div class="avatar-actions">
          <label for="avatarUpload" id="uploadLabel">📸 Choose picture</label>
          <input type="file" id="avatarUpload" accept="image/*">
          <span class="upload-status" id="uploadStatus"></span>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-row">
          <span class="info-label">Full name</span>
          <span class="info-value" id="profileName">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Job role</span>
          <span class="info-value" id="profileJobRole">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Email</span>
          <span class="info-value" id="profileEmail">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">System role</span>
          <span class="info-value" id="profileRole">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Member since</span>
          <span class="info-value" id="profileJoined">—</span>
        </div>
      </div>

      <div class="edit-section">
        <h3>✎ Change your name</h3>
        <div class="edit-form">
          <input type="text" id="newName" placeholder="Enter new full name">
          <button id="updateNameBtn">Update name</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // Supabase setup
      const SUPABASE_URL = 'https://mdqqtsdibtvymfgntstf.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kcXF0c2RpYnR2eW1mZ250c3RmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTI1NjIsImV4cCI6MjA4Nzg4ODU2Mn0.hS-7kmoyFljnhkJEkw7nmgimw9ioQreidyu27_NXYyo';

      if (!window.supabase) {
        document.body.innerHTML = '<p style="color:white;padding:2rem;">Service unavailable. Please refresh.</p>';
        return;
      }
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // DOM elements
      const profileNameEl = document.getElementById('profileName');
      const profileJobRoleEl = document.getElementById('profileJobRole');
      const profileEmailEl = document.getElementById('profileEmail');
      const profileRoleEl = document.getElementById('profileRole');
      const profileJoinedEl = document.getElementById('profileJoined');
      const newNameInput = document.getElementById('newName');
      const updateBtn = document.getElementById('updateNameBtn');
      
      // Avatar elements
      const avatarImage = document.getElementById('avatarImage');
      const avatarPlaceholder = document.getElementById('avatarPlaceholder');
      const avatarUploadInput = document.getElementById('avatarUpload');
      const uploadLabel = document.getElementById('uploadLabel');
      const uploadStatus = document.getElementById('uploadStatus');

      let currentUserId = null;
      let uploading = false;

      // Helper to update avatar display
      function setAvatar(url, name) {
        if (url) {
          avatarImage.src = url;
          avatarImage.style.display = 'block';
          avatarPlaceholder.style.display = 'none';
        } else {
          avatarImage.style.display = 'none';
          avatarPlaceholder.style.display = 'flex';
          // Show initials or default icon
          if (name && name !== '—') {
            const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
            avatarPlaceholder.textContent = initials;
          } else {
            avatarPlaceholder.textContent = '👤';
          }
        }
      }

      // Load profile data
      async function loadProfile() {
        try {
          const { data: { user }, error: userError } = await supabase.auth.getUser();
          if (userError || !user) {
            window.location.href = '/index.html';
            return;
          }

          currentUserId = user.id;
          profileEmailEl.textContent = user.email || '—';

          const { data: profile, error: profileError } = await supabase
            .from('profiles')
            .select('full_name, job_role, role, created_at, avatar_url')
            .eq('id', user.id)
            .single();

          if (profileError) {
            // If error is due to RLS or missing row, show fallback
            console.warn('Could not load profile:', profileError.message);
            const meta = user.user_metadata || {};
            profileNameEl.textContent = meta.full_name || '—';
            profileJobRoleEl.textContent = meta.job_role || '—';
            profileRoleEl.textContent = 'authenticated';
            profileJoinedEl.textContent = user.created_at ? new Date(user.created_at).toLocaleDateString() : '—';
            setAvatar(null, meta.full_name);
            return;
          }

          if (profile) {
            profileNameEl.textContent = profile.full_name || '—';
            profileJobRoleEl.textContent = profile.job_role || '—';
            profileRoleEl.textContent = profile.role || 'user';
            profileJoinedEl.textContent = profile.created_at ? new Date(profile.created_at).toLocaleDateString() : '—';
            setAvatar(profile.avatar_url, profile.full_name);
          }
        } catch (err) {
          console.error('Profile load error:', err);
        }
      }

      // Update full name
      async function updateName() {
        const newName = newNameInput.value.trim();
        if (!newName) {
          alert('Please enter a name.');
          return;
        }

        if (!currentUserId) {
          alert('User not identified.');
          return;
        }

        try {
          const { error } = await supabase
            .from('profiles')
            .update({ full_name: newName })
            .eq('id', currentUserId);

          if (error) {
            // Check for RLS violation
            if (error.message && error.message.includes('row-level security policy')) {
              throw new Error('Permission denied: Your database has Row Level Security enabled but no policy allows you to update your profile. Please add the following policy in your Supabase SQL editor:\n\nCREATE POLICY "Users can update their own profile" ON profiles FOR UPDATE USING (auth.uid() = id) WITH CHECK (auth.uid() = id);');
            }
            throw error;
          }

          // Update UI
          profileNameEl.textContent = newName;
          newNameInput.value = '';
          setAvatar(avatarImage.src || null, newName);
          // Optionally update user_metadata for consistency
          await supabase.auth.updateUser({ data: { full_name: newName } });
          alert('Name updated successfully!');
        } catch (err) {
          console.error('Update error:', err);
          alert('Failed to update name: ' + err.message);
        }
      }

      // Upload avatar automatically when file selected
      async function uploadAvatar(file) {
        if (!file || uploading) return;

        // Basic validation
        if (file.size > 2 * 1024 * 1024) {
          alert('File too large. Maximum 2MB.');
          avatarUploadInput.value = '';
          setAvatar(avatarImage.src || null, profileNameEl.textContent);
          return;
        }
        if (!file.type.startsWith('image/')) {
          alert('Please select an image file.');
          avatarUploadInput.value = '';
          setAvatar(avatarImage.src || null, profileNameEl.textContent);
          return;
        }

        uploading = true;
        uploadLabel.classList.add('disabled');
        uploadStatus.textContent = 'Uploading...';

        try {
          // Generate unique filename
          const fileExt = file.name.split('.').pop();
          const fileName = `${currentUserId}_${Date.now()}.${fileExt}`;
          const filePath = `avatars/${fileName}`;

          // Upload to Supabase Storage
          const { error: uploadError } = await supabase.storage
            .from('avatars')
            .upload(filePath, file, { upsert: true });

          if (uploadError) {
            if (uploadError.message && uploadError.message.includes('bucket')) {
              throw new Error('Bucket "avatars" not found. Please create a public bucket named "avatars" in your Supabase storage dashboard.');
            }
            throw uploadError;
          }

          // Get public URL
          const { data: publicUrlData } = supabase.storage
            .from('avatars')
            .getPublicUrl(filePath);

          const avatarUrl = publicUrlData.publicUrl;

          // Update profiles table
          const { error: updateError } = await supabase
            .from('profiles')
            .update({ avatar_url: avatarUrl })
            .eq('id', currentUserId);

          if (updateError) {
            if (updateError.message && updateError.message.includes('row-level security policy')) {
              throw new Error('Permission denied: Your database has Row Level Security enabled but no policy allows you to update your profile. Please add the following policy in your Supabase SQL editor:\n\nCREATE POLICY "Users can update their own profile" ON profiles FOR UPDATE USING (auth.uid() = id) WITH CHECK (auth.uid() = id);');
            }
            throw updateError;
          }

          // Update UI with final URL
          setAvatar(avatarUrl, profileNameEl.textContent);
          uploadStatus.textContent = 'Upload successful!';
          setTimeout(() => { uploadStatus.textContent = ''; }, 3000);
        } catch (err) {
          console.error('Avatar upload error:', err);
          alert('Failed to upload avatar: ' + err.message);
          // Revert preview to previous avatar (if preview was a blob)
          if (avatarImage.src && avatarImage.src.startsWith('blob:')) {
            setAvatar(null, profileNameEl.textContent);
          } else {
            setAvatar(avatarImage.src || null, profileNameEl.textContent);
          }
          uploadStatus.textContent = 'Upload failed';
        } finally {
          uploading = false;
          uploadLabel.classList.remove('disabled');
          avatarUploadInput.value = '';
          setTimeout(() => {
            if (!uploading) uploadStatus.textContent = '';
          }, 3000);
        }
      }

      // Handle file selection
      avatarUploadInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Show preview immediately (local blob)
        const reader = new FileReader();
        reader.onload = (event) => {
          avatarImage.src = event.target.result;
          avatarImage.style.display = 'block';
          avatarPlaceholder.style.display = 'none';
        };
        reader.readAsDataURL(file);

        // Start upload
        uploadAvatar(file);
      });

      // Logout
      document.getElementById('logout').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = '/index.html';
      });

      // Event listeners
      updateBtn.addEventListener('click', updateName);
      newNameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') updateName();
      });

      loadProfile();
    })();
  </script>
</body>
</html>
