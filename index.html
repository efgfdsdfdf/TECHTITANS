<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>TECH TITANS · Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0b0f17;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
    }

    .top-logo {
      position: absolute;
      top: 2rem;
      left: 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: white;
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .top-logo img {
      height: 2.5rem;
      width: auto;
      filter: drop-shadow(0 4px 8px rgba(66, 140, 255, 0.3));
    }
    .top-logo span {
      color: #428cff;
    }

    .glass-card {
      background: rgba(18, 25, 40, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(66, 140, 255, 0.15);
      border-radius: 2rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(66, 140, 255, 0.1) inset;
    }

    .sub {
      color: #9aa4bf;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      border-left: 3px solid #428cff;
      padding-left: 1rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      color: #b8c3e0;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      background: #0f172f;
      border: 1px solid #263154;
      border-radius: 1.2rem;
      padding: 0.9rem 1.2rem;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #428cff;
      box-shadow: 0 0 0 3px rgba(66, 140, 255, 0.2);
    }

    .btn {
      background: #428cff;
      border: none;
      color: white;
      width: 100%;
      padding: 1rem;
      border-radius: 1.5rem;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 1rem;
      box-shadow: 0 8px 20px -8px #428cff80;
    }

    .btn:hover {
      background: #5f9eff;
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .error {
      color: #ff628c;
      background: #2f1a28;
      border-radius: 1rem;
      padding: 0.75rem 1rem;
      margin-top: 1rem;
      font-size: 0.9rem;
      border: 1px solid #ff628c30;
      display: none;
    }

    .loading {
      display: none;
      color: #9aa4bf;
      text-align: center;
      margin-top: 1rem;
    }

    .forgot-link {
      text-align: right;
      margin-top: 0.5rem;
    }
    .forgot-link a {
      color: #9aa4bf;
      font-size: 0.9rem;
      text-decoration: none;
    }
    .forgot-link a:hover {
      color: #428cff;
      text-decoration: underline;
    }

    .link {
      text-align: center;
      margin-top: 1.5rem;
      color: #9aa4bf;
    }
    .link a {
      color: #428cff;
      text-decoration: none;
      font-weight: 500;
    }
    .link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .top-logo {
        top: 1rem;
        left: 1rem;
        font-size: 1.4rem;
      }
      .top-logo img {
        height: 2rem;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div class="top-logo">
    <!-- Verify that this image path is correct; you may use an inline SVG fallback -->
    <img src="img/titans_logo2.png" alt="TECH TITANS">
    <div>TECH<span>TITANS</span></div>
  </div>

  <div class="glass-card">
    <div class="sub">internal · secure access</div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="name@techtitans.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div class="forgot-link">
        <a href="reset-password.html">Forgot password?</a>
      </div>
      <button type="submit" class="btn" id="submitBtn">Log in</button>
    </form>

    <div id="errorMessage" class="error"></div>
    <div id="loadingMessage" class="loading">Processing…</div>

    <div class="link">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>

  <script>
    (function() {
      // --- Supabase configuration ---
      const SUPABASE_URL = 'https://mdqqtsdibtvymfgntstf.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kcXF0c2RpYnR2eW1mZ250c3RmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTI1NjIsImV4cCI6MjA4Nzg4ODU2Mn0.hS-7kmoyFljnhkJEkw7nmgimw9ioQreidyu27_NXYyo';

      // --- Initialize Supabase client with error handling ---
      let supabase;
      try {
        if (!window.supabase) throw new Error('Supabase library failed to load. Please check your internet connection.');
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('Supabase client initialized');
      } catch (e) {
        console.error('Initialization error:', e);
        const errorDiv = document.getElementById('errorMessage');
        if (errorDiv) {
          errorDiv.textContent = 'Authentication service is unavailable. Please refresh or try again later.';
          errorDiv.style.display = 'block';
        }
        // Disable form to prevent further actions
        document.querySelectorAll('input, button').forEach(el => el.disabled = true);
        return;
      }

      // --- DOM elements ---
      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('errorMessage');
      const loadingDiv = document.getElementById('loadingMessage');


   
      // --- Login form submission ---
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Reset messages
        errorDiv.style.display = 'none';
        loadingDiv.style.display = 'block';
        submitBtn.disabled = true;

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // Basic validation
        if (!email || !password) {
          showError('Please enter both email and password.');
          return;
        }

        try {
          console.log('Attempting sign in for:', email);
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });

          if (error) throw error;

          console.log('Sign in successful, redirecting...');
          window.location.href = 'dashboard.html';
        } catch (err) {
          console.error('Login error:', err);
          let message = err.message || 'Login failed. Please try again.';
          // Friendly error messages
          if (message.includes('Invalid login credentials')) {
            message = 'Invalid email or password.';
          } else if (message.includes('Email not confirmed')) {
            message = 'Please verify your email address before logging in.';
          } else if (message.includes('rate limit')) {
            message = 'Too many attempts. Please wait a moment and try again.';
          }
          showError(message);
        } finally {
          loadingDiv.style.display = 'none';
          submitBtn.disabled = false;
        }
      });

      // Helper to display an error and re‑enable form
      function showError(text) {
        errorDiv.textContent = text;
        errorDiv.style.display = 'block';
        loadingDiv.style.display = 'none';
        submitBtn.disabled = false;
      }
    })();
  </script>
</body>
</html>
