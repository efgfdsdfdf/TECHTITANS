<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TECH TITANS · Resources Hub</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, sans-serif;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #141b2b, #0a0f1a);
      min-height: 100vh;
      display: flex;
      color: #eef2fb;
    }

    /* ---------- SIDEBAR ---------- */
    .sidebar {
      width: 280px;
      background: rgba(18, 26, 40, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-right: 1px solid rgba(66, 140, 255, 0.15);
      padding: 2rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      box-shadow: 4px 0 30px rgba(0, 0, 0, 0.5);
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      padding-left: 0.5rem;
      background: linear-gradient(135deg, #fff 0%, #a0c0ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo span { background: none; -webkit-text-fill-color: #428cff; }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .nav a {
      color: #a5b3d1;
      text-decoration: none;
      padding: 0.9rem 1.2rem;
      border-radius: 1.5rem;
      transition: all 0.2s ease;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 1rem;
      border: 1px solid transparent;
    }
    .nav a i { width: 1.5rem; font-size: 1.2rem; }
    .nav a:hover {
      background: rgba(66, 140, 255, 0.1);
      border-color: rgba(66, 140, 255, 0.3);
      color: white;
    }
    .nav a.active {
      background: linear-gradient(145deg, #428cff, #2a5bbf);
      color: white;
      box-shadow: 0 10px 20px -8px #428cff;
    }

    .logout-btn {
      margin-top: auto;
      background: transparent;
      border: 1px solid #3e4a6b;
      color: #ffb4b4;
      padding: 0.9rem;
      border-radius: 1.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .logout-btn:hover {
      background: rgba(255, 77, 77, 0.1);
      border-color: #ff4d4d;
      color: #fff;
    }

    /* ---------- MAIN CONTENT ---------- */
    .main {
      flex: 1;
      padding: 2rem 2.5rem;
      overflow-y: auto;
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .search-box {
      background: rgba(18, 26, 40, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid #2a3650;
      border-radius: 3rem;
      padding: 0.6rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      width: 300px;
    }
    .search-box i { color: #5b6b92; }
    .search-box input {
      background: transparent;
      border: none;
      color: white;
      outline: none;
      width: 100%;
    }
    .search-box input::placeholder { color: #5b6b92; }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .filter-btn {
      background: #1f2a44;
      border: none;
      color: #a5b3d1;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid transparent;
    }
    .filter-btn.active, .filter-btn:hover {
      background: #428cff;
      color: white;
      border-color: #428cff;
    }

    /* upload card */
    .upload-card {
      background: rgba(18, 26, 40, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(66, 140, 255, 0.3);
      border-radius: 2rem;
      padding: 1.8rem;
      margin-bottom: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    .upload-card h3 {
      color: white;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .upload-card h3 i { color: #428cff; }
    .upload-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }
    .upload-form input, .upload-form select, .upload-form textarea {
      background: #0f172f;
      border: 1px solid #2a3650;
      border-radius: 1.2rem;
      padding: 0.8rem 1.2rem;
      color: white;
      outline: none;
      font-size: 0.95rem;
    }
    .upload-form input:focus, .upload-form select:focus, .upload-form textarea:focus {
      border-color: #428cff;
    }
    .upload-form textarea { grid-column: span 2; resize: vertical; }
    .file-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: #0f172f;
      border: 1px solid #2a3650;
      border-radius: 1.2rem;
      padding: 0.3rem 0.3rem 0.3rem 1.2rem;
    }
    .file-input-wrapper input[type="file"] {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
    .file-input-wrapper i { color: #428cff; margin-right: 0.5rem; }
    .file-input-wrapper span { color: #a5b3d1; font-size: 0.9rem; }
    .upload-btn {
      background: #428cff;
      border: none;
      color: white;
      padding: 0.8rem 1.8rem;
      border-radius: 1.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border: 1px solid #428cff;
    }
    .upload-btn:hover { background: #2a5bbf; }
    .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* resources grid */
    .resources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }
    .resource-card {
      background: rgba(18, 26, 40, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(66, 140, 255, 0.2);
      border-radius: 2rem;
      padding: 1.5rem;
      transition: 0.2s;
      display: flex;
      flex-direction: column;
    }
    .resource-card:hover {
      border-color: #428cff80;
      transform: translateY(-4px);
      box-shadow: 0 20px 30px -15px #428cff;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .category-tag {
      background: #1f2a44;
      color: #a5b3d1;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .file-icon {
      font-size: 2rem;
      color: #428cff;
    }
    .resource-title {
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .resource-desc {
      color: #9aa8cc;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      flex: 1;
    }
    .uploader-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }
    .uploader-avatar {
      width: 28px; height: 28px;
      background: #2f3f66;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 0.8rem;
    }
    .uploader-name { color: white; font-weight: 500; }
    .uploader-role {
      background: #2a3650;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      color: #aac3ff;
    }
    .card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .resource-link, .delete-resource {
      flex: 1;
      text-align: center;
      padding: 0.5rem;
      border-radius: 2rem;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      transition: 0.2s;
    }
    .resource-link {
      background: #428cff;
      color: white;
    }
    .resource-link:hover { background: #2a5bbf; }
    .delete-resource {
      background: transparent;
      border: 1px solid #ff4d4d;
      color: #ff9f9f;
      cursor: pointer;
    }
    .delete-resource:hover {
      background: #ff4d4d20;
      color: #ff4d4d;
    }
    .empty-state {
      text-align: center;
      color: #5b6b92;
      padding: 3rem;
      font-size: 1.1rem;
    }

    /* progress bar */
    .upload-progress {
      height: 6px;
      background: #1f2a44;
      border-radius: 1rem;
      margin-top: 0.5rem;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #428cff;
      width: 0%;
      transition: width 0.2s;
    }

    /* responsive */
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar {
        width: 100%;
        padding: 1rem;
        backdrop-filter: blur(16px);
      }
      .nav { flex-direction: row; flex-wrap: wrap; justify-content: center; }
      .nav a { padding: 0.6rem 1rem; }
      .main { padding: 1rem; }
      .search-box { width: 100%; }
      .upload-form textarea { grid-column: span 1; }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">TECH<span>TITANS</span></div>
    <div class="nav">
      <a href="/dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
      <a href="/messages.html"><i class="fas fa-comments"></i> Messages</a>
      <a href="/resources.html" class="active"><i class="fas fa-book-open"></i> Resources</a>
      <a href="/profile.html"><i class="fas fa-user-cog"></i> Profile</a>
    </div>
    <button class="logout-btn" id="logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>

  <div class="main">
    <div class="top-bar">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search resources...">
      </div>
      <div class="filters" id="filterContainer">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="CEO Reports">CEO Reports</button>
        <button class="filter-btn" data-filter="Team Guides">Team Guides</button>
        <button class="filter-btn" data-filter="Design Assets">Design Assets</button>
        <button class="filter-btn" data-filter="Tech Specs">Tech Specs</button>
        <button class="filter-btn" data-filter="Presentations">Presentations</button>
      </div>
    </div>

    <!-- UPLOAD SECTION (visible to all logged in) -->
    <div class="upload-card">
      <h3><i class="fas fa-cloud-upload-alt"></i> Share your work</h3>
      <div class="upload-form">
        <input type="text" id="titleInput" placeholder="Title *" required>
        <select id="categorySelect">
          <option value="CEO Reports">CEO Reports</option>
          <option value="Team Guides">Team Guides</option>
          <option value="Design Assets">Design Assets</option>
          <option value="Tech Specs">Tech Specs</option>
          <option value="Presentations">Presentations</option>
        </select>
        <textarea id="descInput" placeholder="Description (optional)" rows="2"></textarea>
        <div class="file-input-wrapper">
          <i class="fas fa-paperclip"></i>
          <span id="fileLabel">Choose file...</span>
          <input type="file" id="fileInput" required>
        </div>
        <button class="upload-btn" id="uploadBtn"><i class="fas fa-upload"></i> Upload</button>
      </div>
      <div class="upload-progress" id="progressContainer" style="display: none;">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- RESOURCES GRID -->
    <div id="resourcesGrid" class="resources-grid"></div>
  </div>

  <script>
    (function() {
      // --- Supabase config ---
      const SUPABASE_URL = 'https://mdqqtsdibtvymfgntstf.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kcXF0c2RpYnR2eW1mZ250c3RmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTI1NjIsImV4cCI6MjA4Nzg4ODU2Mn0.hS-7kmoyFljnhkJEkw7nmgimw9ioQreidyu27_NXYyo';

      if (!window.supabase) {
        document.body.innerHTML = '<p style="color:white;padding:2rem;">Failed to load Supabase. Refresh.</p>';
        return;
      }
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // ---------- Global state ----------
      let currentUser = null;
      let currentUserRole = 'member';
      let currentUserName = 'User';
      let allResources = [];
      let currentFilter = 'all';
      let searchTerm = '';

      // ---------- DOM elements ----------
      const grid = document.getElementById('resourcesGrid');
      const searchInput = document.getElementById('searchInput');
      const filterContainer = document.getElementById('filterContainer');
      const uploadBtn = document.getElementById('uploadBtn');
      const titleInput = document.getElementById('titleInput');
      const descInput = document.getElementById('descInput');
      const categorySelect = document.getElementById('categorySelect');
      const fileInput = document.getElementById('fileInput');
      const fileLabel = document.getElementById('fileLabel');
      const progressContainer = document.getElementById('progressContainer');
      const progressFill = document.getElementById('progressFill');

      // ---------- Helper: get file icon class ----------
      function getFileIcon(mimeType, fileName) {
        if (!fileName) return 'fa-file';
        const ext = fileName.split('.').pop().toLowerCase();
        if (['jpg','jpeg','png','gif','bmp','svg','webp'].includes(ext)) return 'fa-file-image';
        if (['pdf'].includes(ext)) return 'fa-file-pdf';
        if (['doc','docx'].includes(ext)) return 'fa-file-word';
        if (['xls','xlsx','csv'].includes(ext)) return 'fa-file-excel';
        if (['ppt','pptx'].includes(ext)) return 'fa-file-powerpoint';
        if (['zip','rar','7z','tar','gz'].includes(ext)) return 'fa-file-archive';
        if (['txt','md'].includes(ext)) return 'fa-file-alt';
        if (['mp4','mov','avi','mkv'].includes(ext)) return 'fa-file-video';
        if (['mp3','wav','ogg'].includes(ext)) return 'fa-file-audio';
        return 'fa-file';
      }

      // ---------- Load user and profile ----------
      async function init() {
        const { data: { user }, error } = await supabase.auth.getUser();
        if (error || !user) {
          window.location.href = '/index.html';
          return;
        }
        currentUser = user;

        // Get user metadata (fallback)
        const metadata = user.user_metadata || {};
        currentUserName = metadata.full_name || user.email?.split('@')[0] || 'User';
        currentUserRole = metadata.role || 'member';  // we might have role in metadata

        // Optionally fetch from profiles table if needed
        const { data: profile } = await supabase
          .from('profiles')
          .select('full_name, role')
          .eq('id', user.id)
          .single();
        if (profile) {
          currentUserName = profile.full_name || currentUserName;
          currentUserRole = profile.role || currentUserRole;
        }

        // Update file label on selection
        fileInput.addEventListener('change', () => {
          fileLabel.textContent = fileInput.files[0]?.name || 'Choose file...';
        });

        // Load resources
        loadResources();

        // Filters
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            filterAndRender();
          });
        });

        // Search
        searchInput.addEventListener('input', (e) => {
          searchTerm = e.target.value.toLowerCase();
          filterAndRender();
        });

        // Upload handler
        uploadBtn.addEventListener('click', uploadResource);
      }

      // ---------- Load resources from DB ----------
      async function loadResources() {
        const { data, error } = await supabase
          .from('resources')
          .select('*')
          .order('created_at', { ascending: false });
        if (error) {
          console.error('Error loading resources:', error);
          allResources = [];
        } else {
          allResources = data || [];
        }
        filterAndRender();
      }

      // ---------- Filter and render ----------
      function filterAndRender() {
        let filtered = allResources;

        // category filter
        if (currentFilter !== 'all') {
          filtered = filtered.filter(r => r.category === currentFilter);
        }

        // search term
        if (searchTerm) {
          filtered = filtered.filter(r => 
            (r.title && r.title.toLowerCase().includes(searchTerm)) ||
            (r.description && r.description.toLowerCase().includes(searchTerm))
          );
        }

        renderResources(filtered);
      }

      // ---------- Render resource cards ----------
      function renderResources(resources) {
        if (!resources.length) {
          grid.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i> No resources found</div>';
          return;
        }

        grid.innerHTML = resources.map(r => {
          const iconClass = getFileIcon(null, r.file_url); // guess from URL
          const isOwner = currentUser && r.uploader_id === currentUser.id;
          const isAdmin = currentUserRole === 'admin';

          // format date
          const date = r.created_at ? new Date(r.created_at).toLocaleDateString() : '';

          return `
            <div class="resource-card">
              <div class="card-header">
                <span class="category-tag">${r.category || 'Uncategorized'}</span>
                <i class="fas ${iconClass} file-icon"></i>
              </div>
              <div class="resource-title">${escapeHtml(r.title)}</div>
              <div class="resource-desc">${escapeHtml(r.description || '')}</div>
              <div class="uploader-info">
                <div class="uploader-avatar">${(r.uploader_name || 'U').charAt(0).toUpperCase()}</div>
                <span class="uploader-name">${escapeHtml(r.uploader_name || 'Unknown')}</span>
                <span class="uploader-role">${escapeHtml(r.uploader_role || 'member')}</span>
                <span style="margin-left:auto; font-size:0.7rem; color:#5b6b92;">${date}</span>
              </div>
              <div class="card-actions">
                <a href="${escapeHtml(r.file_url)}" target="_blank" class="resource-link"><i class="fas fa-download"></i> Open</a>
                ${ (isOwner || isAdmin) ? `<button class="delete-resource" data-id="${r.id}"><i class="fas fa-trash-alt"></i> Delete</button>` : '' }
              </div>
            </div>
          `;
        }).join('');

        // Attach delete handlers
        document.querySelectorAll('.delete-resource').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = e.currentTarget.dataset.id;
            if (!confirm('Delete this resource permanently?')) return;
            // Delete from storage first? We'll need the file path. We stored file_url, we can extract path.
            // For simplicity, we'll just delete DB row (file remains in storage). Better to delete file too.
            // We'll assume bucket is public and we can delete the file using the URL path.
            const resource = allResources.find(r => r.id === id);
            if (resource && resource.file_url) {
              // extract file path from URL (assuming public URL structure)
              const urlParts = resource.file_url.split('/');
              const fileName = urlParts.pop(); // last part
              const bucketPath = `resources/${fileName}`; // adjust if you store with folder
              await supabase.storage.from('resources').remove([bucketPath]);
            }
            const { error } = await supabase.from('resources').delete().eq('id', id);
            if (error) {
              alert('Delete failed: ' + error.message);
            } else {
              loadResources();
            }
          });
        });
      }

      // simple escape
      function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          if (m === '"') return '&quot;';
          return m;
        });
      }

      // ---------- Upload file and metadata ----------
      async function uploadResource() {
        const title = titleInput.value.trim();
        const category = categorySelect.value;
        const description = descInput.value.trim();
        const file = fileInput.files[0];

        if (!title) { alert('Title is required'); return; }
        if (!file) { alert('Please select a file'); return; }

        uploadBtn.disabled = true;
        uploadBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Uploading...';
        progressContainer.style.display = 'block';
        progressFill.style.width = '0%';

        try {
          // 1. Upload file to Supabase Storage (bucket 'resources')
          const fileExt = file.name.split('.').pop();
          const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
          const filePath = `resources/${fileName}`; // optional folder

          const { error: uploadError, data } = await supabase.storage
            .from('resources')
            .upload(filePath, file, {
              cacheControl: '3600',
              upsert: false,
              onUploadProgress: (progress) => {
                const percent = (progress.loaded / progress.total) * 100;
                progressFill.style.width = `${percent}%`;
              }
            });

          if (uploadError) throw uploadError;

          // 2. Get public URL
          const { data: { publicUrl } } = supabase.storage.from('resources').getPublicUrl(filePath);

          // 3. Insert metadata into 'resources' table
          const { error: dbError } = await supabase
            .from('resources')
            .insert({
              title,
              description,
              category,
              file_url: publicUrl,
              uploader_id: currentUser.id,
              uploader_name: currentUserName,
              uploader_role: currentUserRole
            });

          if (dbError) throw dbError;

          // Reset form
          titleInput.value = '';
          descInput.value = '';
          fileInput.value = '';
          fileLabel.textContent = 'Choose file...';
          progressContainer.style.display = 'none';

          // Refresh list
          loadResources();
        } catch (err) {
          console.error(err);
          alert('Upload failed: ' + err.message);
        } finally {
          uploadBtn.disabled = false;
          uploadBtn.innerHTML = '<i class="fas fa-upload"></i> Upload';
        }
      }

      // ---------- Logout ----------
      document.getElementById('logout').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = '/index.html';
      });

      // Start
      init();
    })();
  </script>
</body>
</html>
