<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TECH TITANS · Verify OTP</title>
  <style>/* same styles as before */</style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div class="top-logo">
    <img src="img/titans_logo2.png" alt="TECH TITANS">
    <div>TECH<span>TITANS</span></div>
  </div>

  <div class="glass-card">
    <div class="sub">enter the 6‑digit code</div>

    <div id="timerDisplay" style="color:#428cff; text-align:center; margin-bottom:1rem;">⏳ 60s remaining</div>

    <form id="verifyForm">
      <div class="form-group">
        <label>Verification code</label>
        <input type="text" id="otp" placeholder="123456" maxlength="6" inputmode="numeric" pattern="\d{6}" required>
      </div>
      <button type="submit" class="btn" id="verifyBtn">Verify & continue</button>
    </form>

    <div style="text-align:center; margin-top:1rem;">
      <button id="resendBtn" class="btn" style="background:transparent; color:#9aa4bf; box-shadow:none;" disabled>Resend code (<span id="countdown">60</span>)</button>
    </div>

    <div id="errorMessage" class="error"></div>
    <div id="loadingMessage" class="loading">Verifying…</div>

    <div class="link">
      <a href="reset-password.html">← Request new code</a>
    </div>
  </div>

  <script>
    (function() {
      const SUPABASE_URL = 'https://mdqqtsdibtvymfgntstf.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kcXF0c2RpYnR2eW1mZ250c3RmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTI1NjIsImV4cCI6MjA4Nzg4ODU2Mn0.hS-7kmoyFljnhkJEkw7nmgimw9ioQreidyu27_NXYyo';

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Retrieve email from sessionStorage
      const email = sessionStorage.getItem('resetEmail');
      if (!email) {
        window.location.href = 'reset-password.html';
      }

      // Timer elements
      const timerDisplay = document.getElementById('timerDisplay');
      const countdownSpan = document.getElementById('countdown');
      const resendBtn = document.getElementById('resendBtn');

      let timeLeft = 60;
      let timerInterval;

      function startTimer() {
        timerInterval = setInterval(() => {
          timeLeft -= 1;
          countdownSpan.textContent = timeLeft;
          timerDisplay.textContent = `⏳ ${timeLeft}s remaining`;

          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timerDisplay.textContent = '⏳ Code expired';
            resendBtn.disabled = false;
            resendBtn.style.opacity = '1';
          }
        }, 1000);
      }

      startTimer();

      // Resend code
      resendBtn.addEventListener('click', async () => {
        resendBtn.disabled = true;
        try {
          const { error } = await supabase.auth.signInWithOtp({ email });
          if (error) throw error;

          // Reset timer
          clearInterval(timerInterval);
          timeLeft = 60;
          startTimer();
          resendBtn.disabled = true;
          resendBtn.style.opacity = '0.6';
        } catch (err) {
          alert('Failed to resend code. Try again.');
          resendBtn.disabled = false;
        }
      });

      // Verify OTP
      const form = document.getElementById('verifyForm');
      const otpInput = document.getElementById('otp');
      const verifyBtn = document.getElementById('verifyBtn');
      const errorDiv = document.getElementById('errorMessage');
      const loadingDiv = document.getElementById('loadingMessage');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        errorDiv.style.display = 'none';
        loadingDiv.style.display = 'block';
        verifyBtn.disabled = true;

        const token = otpInput.value.trim();
        if (!/^\d{6}$/.test(token)) {
          showError('Please enter a valid 6‑digit code.');
          return;
        }

        try {
          const { data, error } = await supabase.auth.verifyOtp({
            email,
            token,
            type: 'email'
          });

          if (error) throw error;

          // OTP verified – user is now signed in
          // Redirect to update password page
          window.location.href = 'update-password.html';
        } catch (err) {
          let msg = err.message || 'Invalid or expired code.';
          if (msg.includes('expired')) msg = 'Code expired. Request a new one.';
          showError(msg);
        } finally {
          loadingDiv.style.display = 'none';
          verifyBtn.disabled = false;
        }
      });

      function showError(text) {
        errorDiv.textContent = text;
        errorDiv.style.display = 'block';
        loadingDiv.style.display = 'none';
        verifyBtn.disabled = false;
      }
    })();
  </script>

    <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0b0f17;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
    }

    .top-logo {
      position: absolute;
      top: 2rem;
      left: 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: white;
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .top-logo img {
      height: 2.5rem;
      width: auto;
      filter: drop-shadow(0 4px 8px rgba(66, 140, 255, 0.3));
    }
    .top-logo span {
      color: #428cff;
    }

    .glass-card {
      background: rgba(18, 25, 40, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(66, 140, 255, 0.15);
      border-radius: 2rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(66, 140, 255, 0.1) inset;
    }

    .sub {
      color: #9aa4bf;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      border-left: 3px solid #428cff;
      padding-left: 1rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      color: #b8c3e0;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      background: #0f172f;
      border: 1px solid #263154;
      border-radius: 1.2rem;
      padding: 0.9rem 1.2rem;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #428cff;
      box-shadow: 0 0 0 3px rgba(66, 140, 255, 0.2);
    }

    .btn {
      background: #428cff;
      border: none;
      color: white;
      width: 100%;
      padding: 1rem;
      border-radius: 1.5rem;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 1rem;
      box-shadow: 0 8px 20px -8px #428cff80;
    }

    .btn:hover {
      background: #5f9eff;
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.6;
      pointer-events: none;
    }

    /* Special style for the resend button (ghost) */
    .btn-ghost {
      background: transparent;
      color: #9aa4bf;
      box-shadow: none;
      border: 1px solid transparent;
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.05);
      color: #428cff;
      transform: none;
      border-color: #428cff30;
    }
    .btn-ghost:disabled {
      opacity: 0.4;
    }

    .timer {
      color: #428cff;
      text-align: center;
      margin-bottom: 1rem;
      font-size: 1.1rem;
      font-weight: 500;
    }

    .error {
      color: #ff628c;
      background: #2f1a28;
      border-radius: 1rem;
      padding: 0.75rem 1rem;
      margin-top: 1rem;
      font-size: 0.9rem;
      border: 1px solid #ff628c30;
      display: none;
    }

    .success {
      color: #2ea67a;
      background: #1a2f26;
      border-radius: 1rem;
      padding: 0.75rem 1rem;
      margin-top: 1rem;
      font-size: 0.9rem;
      border: 1px solid #2ea67a30;
      display: none;
    }

    .loading {
      display: none;
      color: #9aa4bf;
      text-align: center;
      margin-top: 1rem;
    }

    .link {
      text-align: center;
      margin-top: 1.5rem;
      color: #9aa4bf;
    }
    .link a {
      color: #428cff;
      text-decoration: none;
      font-weight: 500;
    }
    .link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .top-logo {
        top: 1rem;
        left: 1rem;
        font-size: 1.4rem;
      }
      .top-logo img {
        height: 2rem;
      }
    }
  </style>
</body>
</html>
