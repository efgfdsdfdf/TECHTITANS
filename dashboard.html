<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TECH TITANS · Dashboard</title>
  <!-- Font Awesome Icons (v6 free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Chart.js for message trend -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #141b2b, #0a0f1a);
      min-height: 100vh;
      display: flex;
      color: #eef2fb;
    }

    /* ---------- SIDEBAR ---------- */
    .sidebar {
      width: 280px;
      background: rgba(18, 26, 40, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-right: 1px solid rgba(66, 140, 255, 0.15);
      padding: 2rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      box-shadow: 4px 0 30px rgba(0, 0, 0, 0.5);
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      padding-left: 0.5rem;
      background: linear-gradient(135deg, #fff 0%, #a0c0ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo span { background: none; -webkit-text-fill-color: #428cff; }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .nav a {
      color: #a5b3d1;
      text-decoration: none;
      padding: 0.9rem 1.2rem;
      border-radius: 1.5rem;
      transition: all 0.2s ease;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
      border: 1px solid transparent;
    }
    .nav a i { width: 1.5rem; font-size: 1.2rem; }
    .nav a:hover {
      background: rgba(66, 140, 255, 0.1);
      border-color: rgba(66, 140, 255, 0.3);
      color: white;
    }
    .nav a.active {
      background: linear-gradient(145deg, #428cff, #2a5bbf);
      color: white;
      box-shadow: 0 10px 20px -8px #428cff;
    }

    .sidebar-unread {
      background: #ff4d4d;
      color: white;
      border-radius: 2rem;
      padding: 0.2rem 0.6rem;
      font-size: 0.7rem;
      font-weight: 700;
      margin-left: auto;
      box-shadow: 0 0 0 2px #0f1a2f;
    }

    .logout-btn {
      margin-top: auto;
      background: transparent;
      border: 1px solid #3e4a6b;
      color: #ffb4b4;
      padding: 0.9rem;
      border-radius: 1.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .logout-btn:hover {
      background: rgba(255, 77, 77, 0.1);
      border-color: #ff4d4d;
      color: #fff;
    }

    /* ---------- MAIN CONTENT ---------- */
    .main {
      flex: 1;
      padding: 2rem 2.5rem;
      overflow-y: auto;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 2rem;
    }
    .user-greeting {
      background: rgba(26, 35, 53, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 0.7rem 2rem;
      border-radius: 3rem;
      border: 1px solid rgba(66, 140, 255, 0.3);
      font-weight: 500;
      color: #d3e0ff;
    }
    .user-greeting i { margin-right: 0.5rem; color: #428cff; }
    .user-greeting span { color: white; font-weight: 600; }

    /* dashboard grid */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.8rem;
      margin-bottom: 2.5rem;
    }
    .card {
      background: rgba(18, 26, 40, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(66, 140, 255, 0.2);
      border-radius: 2.2rem;
      padding: 1.8rem 1.5rem;
      transition: 0.2s;
      box-shadow: 0 15px 30px -15px rgba(0, 0, 0, 0.6);
    }
    .card:hover {
      border-color: #428cff80;
      box-shadow: 0 20px 35px -15px #428cff;
      transform: translateY(-3px);
    }
    .card-title {
      color: #8f9fc9;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .card-value {
      color: white;
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.3rem;
    }
    .card-label {
      color: #5b6b92;
      font-size: 0.85rem;
    }

    /* chart & activity row */
    .row-duo {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 1.8rem;
      margin-top: 1rem;
    }
    .chart-container, .activity-feed {
      background: rgba(18, 26, 40, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(66, 140, 255, 0.2);
      border-radius: 2.2rem;
      padding: 1.8rem;
    }
    .chart-container h3, .activity-feed h3 {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      color: white;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .chart-container h3 i, .activity-feed h3 i { color: #428cff; }
    canvas { max-height: 200px; width: 100% !important; }

    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 0.8rem 0;
      border-bottom: 1px solid rgba(66, 140, 255, 0.1);
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-avatar {
      width: 36px; height: 36px;
      background: #1f2f4a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #428cff;
      font-weight: bold;
    }
    .activity-details {
      flex: 1;
    }
    .activity-name {
      font-weight: 600;
      color: white;
    }
    .activity-msg {
      color: #aab9e0;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
    .activity-time {
      font-size: 0.7rem;
      color: #5f73a3;
    }

    /* loading state */
    .loading {
      opacity: 0.6;
      pointer-events: none;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 1000px) {
      .row-duo { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar {
        width: 100%;
        padding: 1rem;
        gap: 1rem;
        backdrop-filter: blur(16px);
      }
      .nav { flex-direction: row; flex-wrap: wrap; justify-content: center; }
      .nav a { padding: 0.6rem 1rem; font-size: 0.9rem; }
      .sidebar-unread { position: absolute; top: -2px; right: -2px; }
      .main { padding: 1rem; }
      .dashboard-grid { gap: 1rem; }
    }
    @media (max-width: 480px) {
      .card-value { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">TECH<span>TITANS</span></div>
    <div class="nav">
      <a href="dashboard.html" class="active"><i class="fas fa-chart-pie"></i> Dashboard</a>
      <a href="messages.html" id="chatNavLink"><i class="fas fa-comments"></i> GROUP CHAT
        <span class="sidebar-unread" id="sidebarUnreadBadge" style="display: none;">0</span>
      </a>
      <a href="resources.html"><i class="fas fa-book-open"></i> Resources</a>
      <a href="profile.html"><i class="fas fa-user-cog"></i> Profile</a>
    </div>
    <button class="logout-btn" id="logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>

  <div class="main">
    <div class="top-bar">
      <div class="user-greeting"><i class="fas fa-hand-peace"></i> Hello, <span id="userName"></span></div>
    </div>

    <!-- user info cards (dynamic) -->
    <div class="dashboard-grid" id="userInfoGrid">
      <!-- filled by js -->
    </div>

    <!-- extended stats + chart + activity -->
    <div class="row-duo">
      <!-- message trend chart -->
      <div class="chart-container">
        <h3><i class="fas fa-chart-line"></i> Message activity (7 days)</h3>
        <canvas id="messageChart"></canvas>
        <p class="card-label" style="margin-top: 0.8rem; text-align: center;">messages per day</p>
      </div>
      <!-- recent activity feed -->
      <div class="activity-feed">
        <h3><i class="fas fa-clock"></i> Recent activity</h3>
        <div id="recentActivityList">
          <div class="activity-item loading">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // --- Supabase config ---
      const SUPABASE_URL = 'https://mdqqtsdibtvymfgntstf.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kcXF0c2RpYnR2eW1mZ250c3RmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTI1NjIsImV4cCI6MjA4Nzg4ODU2Mn0.hS-7kmoyFljnhkJEkw7nmgimw9ioQreidyu27_NXYyo';

      if (!window.supabase) {
        document.body.innerHTML = '<p style="color:white;padding:2rem;">Failed to load Supabase. Refresh.</p>';
        return;
      }
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      let currentUser = null;
      let currentRole = null;
      let isCEO = false;
      let unreadCount = 0;
      let refreshInterval = null;
      let messageChart = null;

      // --- Helper: update badge ---
      function updateBadge(count) {
        const badge = document.getElementById('sidebarUnreadBadge');
        if (!badge) return;
        if (count > 0) {
          badge.style.display = 'inline-block';
          badge.textContent = count;
        } else {
          badge.style.display = 'none';
        }
      }

      // --- Fetch unread count (same logic as original) ---
      async function fetchUnreadCount() {
        if (!currentUser || !currentRole) return 0;
        try {
          let query = supabase.from('group_messages').select('id, sender_id');
          if (!isCEO) query = query.eq('role', currentRole);
          const { data: messages, error: msgError } = await query;
          if (msgError) throw msgError;
          const messageIds = messages.map(m => m.id);
          let readSet = new Set();
          if (messageIds.length) {
            const { data: reads } = await supabase
              .from('message_reads')
              .select('message_id')
              .eq('user_id', currentUser.id)
              .in('message_id', messageIds);
            if (reads) readSet = new Set(reads.map(r => r.message_id));
          }
          return messages.filter(msg => !readSet.has(msg.id) && msg.sender_id !== currentUser.id).length;
        } catch (err) {
          console.error('unread error:', err);
          return 0;
        }
      }

      // --- Refresh badge ---
      async function refreshUnreadBadge() {
        unreadCount = await fetchUnreadCount();
        updateBadge(unreadCount);
      }

      // --- Fetch total messages (for stats) ---
      async function fetchTotalMessages() {
        try {
          let query = supabase.from('group_messages').select('*', { count: 'exact', head: true });
          if (!isCEO && currentRole) query = query.eq('role', currentRole);
          const { count, error } = await query;
          return error ? 0 : count;
        } catch { return 0; }
      }

      // --- Fetch total resources (assuming table 'resources' exists) ---
      async function fetchTotalResources() {
        try {
          const { count, error } = await supabase.from('resources').select('*', { count: 'exact', head: true });
          return error ? 0 : count;
        } catch { return 0; }
      }

      // --- Fetch last 3 messages for activity feed ---
      async function fetchRecentMessages() {
        try {
          let query = supabase
            .from('group_messages')
            .select('id, content, created_at, sender_id, profiles!inner(full_name)')
            .order('created_at', { ascending: false })
            .limit(3);
          if (!isCEO && currentRole) query = query.eq('role', currentRole);
          const { data, error } = await query;
          if (error) throw error;
          return data || [];
        } catch (err) {
          console.error('recent messages error:', err);
          return [];
        }
      }

      // --- Fetch message counts per day for last 7 days ---
      async function fetchDailyCounts() {
        try {
          const now = new Date();
          const sevenDaysAgo = new Date(now);
          sevenDaysAgo.setDate(now.getDate() - 7);
          const start = sevenDaysAgo.toISOString();

          let query = supabase
            .from('group_messages')
            .select('created_at')
            .gte('created_at', start);
          if (!isCEO && currentRole) query = query.eq('role', currentRole);
          const { data, error } = await query;
          if (error) throw error;

          // group by day
          const counts = {};
          for (let i = 0; i < 7; i++) {
            const d = new Date(now);
            d.setDate(now.getDate() - i);
            const ymd = d.toISOString().split('T')[0];
            counts[ymd] = 0;
          }
          data.forEach(msg => {
            const day = msg.created_at.split('T')[0];
            if (counts.hasOwnProperty(day)) counts[day]++;
          });
          // return sorted by date ascending
          return Object.keys(counts).sort().map(date => ({ date, count: counts[date] }));
        } catch (err) {
          console.error('daily counts error:', err);
          return [];
        }
      }

      // --- Render chart ---
      async function renderChart() {
        const daily = await fetchDailyCounts();
        const ctx = document.getElementById('messageChart').getContext('2d');
        if (messageChart) messageChart.destroy();
        messageChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: daily.map(d => d.date.slice(5)), // MM-DD
            datasets: [{
              label: 'messages',
              data: daily.map(d => d.count),
              backgroundColor: '#428cff80',
              borderRadius: 6,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, grid: { color: '#2f3f66' }, ticks: { color: '#a0b0d0' } },
                     x: { ticks: { color: '#a0b0d0' } } }
          }
        });
      }

      // --- Render activity feed ---
      async function renderActivity() {
        const recent = await fetchRecentMessages();
        const container = document.getElementById('recentActivityList');
        if (!recent.length) {
          container.innerHTML = '<div class="activity-item">No recent messages</div>';
          return;
        }
        container.innerHTML = recent.map(msg => {
          const name = msg.profiles?.full_name || 'User';
          const initial = name.charAt(0).toUpperCase();
          const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          return `
            <div class="activity-item">
              <div class="activity-avatar">${initial}</div>
              <div class="activity-details">
                <span class="activity-name">${name}</span>
                <div class="activity-msg">${msg.content || '📎 file'}</div>
                <span class="activity-time">${time}</span>
              </div>
            </div>
          `;
        }).join('');
      }

      // --- Update stats cards (total messages, unread, resources) ---
      async function updateStatsCards() {
        const [totalMsg, unread, totalRes] = await Promise.all([
          fetchTotalMessages(),
          fetchUnreadCount(),
          fetchTotalResources()
        ]);
        // inject extra cards after user info grid
        const grid = document.getElementById('userInfoGrid');
        // keep existing 5 user cards, then add 3 stats cards
        const existing = grid.querySelectorAll('.card:not(.stats-card)');
        // remove old stats cards if any
        document.querySelectorAll('.stats-card').forEach(el => el.remove());
        const statsHTML = `
          <div class="card stats-card">
            <div class="card-title"><i class="fas fa-envelope"></i> Total messages</div>
            <div class="card-value">${totalMsg}</div>
            <div class="card-label">in current scope</div>
          </div>
          <div class="card stats-card">
            <div class="card-title"><i class="fas fa-bell"></i> Unread</div>
            <div class="card-value">${unread}</div>
            <div class="card-label">messages waiting</div>
          </div>
          <div class="card stats-card">
            <div class="card-title"><i class="fas fa-archive"></i> Resources</div>
            <div class="card-value">${totalRes}</div>
            <div class="card-label">available files</div>
          </div>
        `;
        grid.insertAdjacentHTML('beforeend', statsHTML);
      }

      // --- Load user and populate base cards ---
      async function loadDashboard() {
        try {
          const { data: { user }, error } = await supabase.auth.getUser();
          if (error || !user) {
            window.location.href = '/index.html';
            return;
          }
          currentUser = user;
          const metadata = user.user_metadata || {};
          const fullName = metadata.full_name || 'User';
          const jobRole = metadata.job_role || 'Not specified';
          const firstName = fullName.split(' ')[0] || 'User';
          const email = user.email || '—';
          const createdAt = user.created_at 
            ? new Date(user.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) 
            : '—';
          const role = metadata.role || 'member';

          currentRole = jobRole;
          isCEO = (currentRole === 'CEO');

          document.getElementById('userName').textContent = firstName;

          // Build user info cards
          const grid = document.getElementById('userInfoGrid');
          grid.innerHTML = `
            <div class="card">
              <div class="card-title"><i class="fas fa-user"></i> Full name</div>
              <div class="card-value">${fullName}</div>
              <div class="card-label">registered user</div>
            </div>
            <div class="card">
              <div class="card-title"><i class="fas fa-envelope"></i> Email</div>
              <div class="card-value">${email}</div>
              <div class="card-label">Registered Email</div>
            </div>
            <div class="card">
              <div class="card-title"><i class="fas fa-briefcase"></i> Job role</div>
              <div class="card-value">${jobRole}</div>
              <div class="card-label">team function</div>
            </div>
            <div class="card">
              <div class="card-title"><i class="fas fa-lock"></i> System role</div>
              <div class="card-value">${role}</div>
              <div class="card-label">access level</div>
            </div>
            <div class="card">
              <div class="card-title"><i class="fas fa-calendar"></i> Member since</div>
              <div class="card-value">${createdAt}</div>
              <div class="card-label">join date</div>
            </div>
          `;

          // Start periodic unread sync
          refreshUnreadBadge();
          refreshInterval = setInterval(refreshUnreadBadge, 10000);
          document.addEventListener('visibilitychange', () => {
            if (!document.hidden) refreshUnreadBadge();
          });

          // Load extended stats & chart & activity
          await Promise.all([
            updateStatsCards(),
            renderChart(),
            renderActivity()
          ]);

        } catch (err) {
          console.error('Dashboard load error:', err);
        }
      }

      // --- Logout ---
      document.getElementById('logout').addEventListener('click', async () => {
        if (refreshInterval) clearInterval(refreshInterval);
        await supabase.auth.signOut();
        window.location.href = '/index.html';
      });

      // --- Initialise ---
      loadDashboard();
    })();
  </script>
</body>

</html>
